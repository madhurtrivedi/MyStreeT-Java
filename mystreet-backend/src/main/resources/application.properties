# App
spring.application.name=mystreet-backend

# H2 Database
spring.datasource.url=jdbc:h2:mem:mystreetdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=mystreet-super-secret-key-change-in-production-32chars
app.jwt.expiration-ms=86400000

# Server
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.mystreet=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/mystreet.log
